<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Itens - Renascer Union</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .navigation {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            text-align: center;
        }
        
        .nav-link {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        

        
        .nav-link.active {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .item-card {
            background: var(--macos-bg-secondary);
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #dc2626;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        

    </style>
</head>
<body>
    <script>
        // Redirect to login if not authenticated as admin
        const userType = sessionStorage.getItem('userType');
        if (userType !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
    
    <div class="container">
        <header>
            <h1>Renascer Union</h1>
            <h2>Sistema de Cadastro de Itens</h2>
            <div class="navigation">
                 <a href="index.html" class="nav-link">Jogadores</a>
                 <a href="itens.html" class="nav-link active">Itens</a>
                 <a href="distribuicao.html" class="nav-link">Distribuição</a>
             </div>
        </header>

        <main>
            <div class="form-section">
                <h3>Cadastrar Novo Item</h3>
                <form id="itemForm">
                    <div class="input-group">
                        <label for="itemName">Nome do Item:</label>
                        <input type="text" id="itemName" name="itemName" required placeholder="Digite o nome do item">
                    </div>
                    <div class="input-group">
                        <label for="itemDescription">Descrição (opcional):</label>
                        <input type="text" id="itemDescription" name="itemDescription" placeholder="Digite uma descrição do item">
                    </div>
                    <div class="input-group">
                        <label for="itemCategory">Categoria:</label>
                        <select id="itemCategory" name="itemCategory" required>
                            <option value="">Selecione uma categoria</option>
                            <option value="arma">Arma</option>
                            <option value="armadura">Armadura</option>
                            <option value="acessorio">Acessório</option>
                            <option value="consumivel">Consumível</option>
                            <option value="material">Material</option>
                            <option value="quest">Quest</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-buttons">
                        <button type="submit">Cadastrar Item</button>
                        <button type="button" id="cancelEditItemBtn" class="cancel-btn" style="display: none;" onclick="itemManager.cancelEdit()">Cancelar Edição</button>
                    </div>
                </form>
            </div>

            <div class="players-section">
                <h3>Itens Cadastrados</h3>
                <div class="filter-section" style="margin-bottom: 20px;">
                    <select id="categoryFilter" style="padding: 8px; border-radius: 5px; border: 1px solid #ddd;">
                        <option value="">Todas as categorias</option>
                        <option value="arma">Arma</option>
                        <option value="armadura">Armadura</option>
                        <option value="acessorio">Acessório</option>
                        <option value="consumivel">Consumível</option>
                        <option value="material">Material</option>
                        <option value="quest">Quest</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>
                <div id="itemsList" class="players-list">
                    <p class="no-players">Nenhum item cadastrado ainda.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="itens.js"></script>
</body>
</html>
